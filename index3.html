<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1024, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Cotação BTC e ETH</title>

  <style type="text/css">
    * {
      margin: 0;
      padding: 0;
    }
    html, body {
      height: 100%;
      width: 1024px;
      margin: 0 auto;
      color: white;
      font-family: Arial, Helvetica, sans-serif;
      overflow: hidden;
      text-align: center;
    }

    #bg-video {
      position: fixed;
      top: 50%;
      left: 50%;
      min-width: 100%;
      min-height: 100%;
      width: auto;
      height: auto;
      transform: translate(-50%, -50%);
      z-index: -2;
    }

    .overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(10, 31, 58, 0.25);
      z-index: -1;
    }

    .container {
      height: 100%;
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    h1 {
      font-size: 60px;
      margin-bottom: 40px;
      color: #ffffff;
    }

    .item {
      margin: 40px 0;
      font-size: 120px;
      font-weight: bold;
      background: rgba(0, 0, 0, 0.30);     /* tarja preta 30% de opacidade */
      padding: 20px 40px;                  /* espaço interno para ficar bonito */
      border-radius: 16px;                 /* cantos arredondados (opcional, mas fica mais elegante) */
      backdrop-filter: blur(4px);          /* leve desfoque de fundo – melhora muito a legibilidade */
      -webkit-backdrop-filter: blur(4px);  /* suporte Safari/iOS antigo */
      box-shadow: 0 4px 20px rgba(0,0,0,0.4); /* sombra sutil para destacar */
      min-width: 680px;                    /* garante largura mínima para não ficar muito estreito */
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .btc { color: #f58e11; }
    .eth { color: #102578; }

    .price {
      font-size: 108px;
      font-weight: bold;
    }

    img {
      width: 120px;
      height: auto;
      vertical-align: middle;
      margin-right: 20px;
    }

    #status {
      font-size: 28px;
      color: #aaccff;
      margin-top: 60px;
    }
  </style>
</head>
<body>

  <video id="bg-video" autoplay loop muted playsinline>
    <source src="fundo btc.mp4" type="video/mp4">
  </video>

  <div class="overlay"></div>

  <div class="container">
    <h1>Cotações Crypto</h1>
    <div class="item btc">
      <img 
        src="https://cryptologos.cc/logos/bitcoin-btc-logo.svg?v=040" 
        onerror="this.outerHTML='<span style=\'color:#f7931a; font-size:120px; vertical-align:middle; margin-right:20px;\'>₿</span>'" 
        alt="BTC">
      BTC    <span class="price" id="btc">—</span>
    </div>
    <div class="item eth">
      <img 
        src="https://cryptologos.cc/logos/ethereum-eth-logo.svg?v=040" 
        onerror="this.outerHTML='<span style=\'color:#627eea; font-size:120px; vertical-align:middle; margin-right:20px;\'>Ξ</span>'" 
        alt="ETH">
      ETH    <span class="price" id="eth">—</span>
    </div>
    <div id="status">Carregando...</div>
  </div>

  <script type="text/javascript">
    var btcEl = document.getElementById('btc');
    var ethEl = document.getElementById('eth');
    var statusEl = document.getElementById('status');

    var countdownInterval = null;
    var lastUpdateStr = '';
    var nextUpdateTime = 0;

    function formatNumber(num) {
      num = parseFloat(num);
      if (isNaN(num)) return '—';
      var str = num.toFixed(2);
      var parts = str.split('.');
      parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, '.');
      return parts.join(',');
    }

    function startCountdownDisplay() {
      if (countdownInterval) clearInterval(countdownInterval);
      nextUpdateTime = Date.now() + 300000;
      updateCountdownDisplay();
      countdownInterval = setInterval(updateCountdownDisplay, 1000);
    }

    function updateCountdownDisplay() {
      var remainingMs = nextUpdateTime - Date.now();
      if (remainingMs < 0) remainingMs = 0;
      var remainingSec = Math.floor(remainingMs / 1000);
      var minsLeft = Math.floor(remainingSec / 60);
      var secsLeft = remainingSec % 60;
      var countdownText = '(' + minsLeft + ':' + (secsLeft < 10 ? '0' : '') + secsLeft + ')';
      statusEl.innerHTML = lastUpdateStr + ' ' + countdownText;
    }

    function loadPrices() {
      if (countdownInterval) {
        clearInterval(countdownInterval);
        countdownInterval = null;
      }
      statusEl.innerHTML = 'Buscando preços...';

      var xhr = new XMLHttpRequest();
      var ts = new Date().getTime();
      xhr.open('GET', 'crypto_prices.txt?_=' + ts, true);

      xhr.onreadystatechange = function() {
        if (xhr.readyState === 4) {
          if (xhr.status === 200) {
            var text = xhr.responseText;
            var lines = text.split('\n');
            var btcVal = null;
            var ethVal = null;

            for (var i = 0; i < lines.length; i++) {
              var line = lines[i].trim();
              if (line === '' || line.charAt(0) === '#') continue;

              if (line.indexOf('BTC') !== -1) {
                var parts = line.split(':');
                if (parts.length > 1) btcVal = parts[1].trim().split(' ')[0];
              }
              if (line.indexOf('ETH') !== -1) {
                var parts = line.split(':');
                if (parts.length > 1) ethVal = parts[1].trim().split(' ')[0];
              }
            }

            if (btcVal !== null && ethVal !== null) {
              btcEl.innerHTML = formatNumber(btcVal);
              ethEl.innerHTML = formatNumber(ethVal);

              var d = new Date();
              var h = d.getHours();
              var m = d.getMinutes();
              lastUpdateStr = 'Atualizado às ' + h + ':' + (m < 10 ? '0' : '') + m;

              startCountdownDisplay();
            } else {
              statusEl.innerHTML = 'Erro: preços não encontrados';
            }
          } else {
            statusEl.innerHTML = 'Erro ao carregar (status ' + xhr.status + ')';
          }
        }
      };
      xhr.send(null);
    }

    loadPrices();
    setInterval(loadPrices, 300000);
  </script>
</body>
</html>
