<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1024, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Cotação BTC e ETH</title>

  <style type="text/css">
    * { margin: 0; padding: 0; }
    html, body {
      height: 100%;
      width: 1024px;
      margin: 0 auto;
      color: white;
      font-family: Arial, Helvetica, sans-serif;
      overflow: hidden;
      text-align: center;
      background-color: #000000; /* forte fallback preto */
    }

    #bg-video {
      position: fixed;
      top: 50%;
      left: 50%;
      min-width: 100%;
      min-height: 100%;
      width: auto;
      height: auto;
      transform: translate(-50%, -50%);
      z-index: -2;
    }

    .overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(10, 31, 58, 0.25);
      z-index: -1;
    }

    .container {
      height: 100%;
      position: relative;
      z-index: 1;
      display: -webkit-flex;
      display: flex;
      -webkit-flex-direction: column;
      flex-direction: column;
      -webkit-justify-content: center;
      justify-content: center;
      -webkit-align-items: center;
      align-items: center;
    }

    h1 { font-size: 60px; margin-bottom: 40px; color: #ffffff; }

    .item {
      margin: 40px 0;
      font-size: 120px;
      font-weight: bold;
      background: rgba(0, 0, 0, 0.30);
      padding: 20px 40px;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      min-width: 720px;
      display: -webkit-flex;
      display: flex;
      -webkit-align-items: center;
      align-items: center;
      -webkit-justify-content: center;
      justify-content: center;
      white-space: nowrap;
      overflow: hidden;
    }

    .item { -webkit-backdrop-filter: blur(4px); backdrop-filter: blur(4px); }

    .btc { color: #f58e11; }
    .eth { color: #edc40c; }
    .price { font-size: 108px; font-weight: bold; }

    img {
      width: 120px;
      height: auto;
      vertical-align: middle;
      margin-right: 20px;
    }

    #status {
      font-size: 28px;
      color: #000000;
      -webkit-text-stroke: 0.8px #555555;
      text-shadow: -1px -1px 0 #cccccc, 1px -1px 0 #cccccc, -1px 1px 0 #cccccc, 1px 1px 0 #cccccc;
      margin-top: 60px;
      background: rgba(255, 255, 255, 0.75);
      padding: 8px 20px;
      border-radius: 12px;
      -webkit-backdrop-filter: blur(4px);
      backdrop-filter: blur(4px);
      line-height: 1.4;
    }
  </style>
</head>
<body>

  <!-- Poster ajuda a evitar tela totalmente preta enquanto o vídeo carrega -->
  <video id="bg-video" 
         loop 
         muted 
         playsinline 
         webkit-playsinline 
         preload="metadata"
         poster="black-poster.jpg">   <!-- crie um arquivo preto simples chamado black-poster.jpg ou remova o poster -->
    <source src="fundo btc.mp4" type="video/mp4">
  </video>

  <div class="overlay"></div>

  <div class="container">
    <h1>Cotações Crypto</h1>
    <div class="item btc">
      <img src="bitcoin-btc-logo.svg" 
           onerror="this.outerHTML='<span style=\'color:#f7931a; font-size:120px; vertical-align:middle; margin-right:20px;\'>₿</span>'" 
           alt="BTC">
      BTC&nbsp;&nbsp;<span class="price" id="btc">—</span>
    </div>
    <div class="item eth">
      <img src="ethereum-eth-logo.svg" 
           onerror="this.outerHTML='<span style=\'color:#627eea; font-size:120px; vertical-align:middle; margin-right:20px;\'>Ξ</span>'" 
           alt="ETH">
      ETH&nbsp;&nbsp;<span class="price" id="eth">—</span>
    </div>
    <div id="status">Carregando preços iniciais...</div>
  </div>

  <script type="text/javascript">
    var btcEl = document.getElementById('btc');
    var ethEl = document.getElementById('eth');
    var statusEl = document.getElementById('status');
    var videoEl = document.getElementById('bg-video');

    var countdownInterval = null;
    var lastUpdateStr = '';
    var timeOffset = 0;

    // === FUNÇÃO AGRESSIVA PARA FORÇAR VÍDEO NO IPAD A1395 ===
    function forceVideoPlay() {
      if (!videoEl) return;
      videoEl.muted = true;
      videoEl.play().catch(function(){});

      // Tenta várias vezes com intervalos diferentes (iPad antigo é lento)
      setTimeout(function() {
        if (videoEl.paused) videoEl.play().catch(function(){});
      }, 600);

      setTimeout(function() {
        if (videoEl.paused) videoEl.play().catch(function(){});
      }, 1500);
    }

    function restartVideo() {
      if (!videoEl) return;
      videoEl.pause();
      videoEl.currentTime = 0;
      setTimeout(function() {
        forceVideoPlay();
      }, 300);
    }

    function getRealMs() {
      return Date.now() + timeOffset;
    }

    function syncServerTime(callback) {
      var xhr = new XMLHttpRequest();
      xhr.open('HEAD', 'crypto_prices.txt?_=' + Date.now(), true);
      xhr.onreadystatechange = function() {
        if (xhr.readyState === 4) {
          var dateStr = xhr.getResponseHeader('Date');
          if (dateStr) timeOffset = new Date(dateStr).getTime() - Date.now();
          if (callback) callback();
        }
      };
      xhr.send();
    }

    function formatNumber(num) {
      num = parseFloat(num);
      if (isNaN(num)) return '—';
      var str = num.toFixed(2);
      var parts = str.split('.');
      parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, '.');
      return parts.join(',');
    }

    function startCountdownDisplay(targetTimeMs) {
      if (countdownInterval) clearInterval(countdownInterval);

      function update() {
        var remainingMs = targetTimeMs - getRealMs();
        if (remainingMs <= 0) {
          statusEl.innerHTML = lastUpdateStr + ' (atualizando...)';
          clearInterval(countdownInterval);
          return;
        }
        var sec = Math.floor(remainingMs / 1000);
        var m = Math.floor(sec / 60);
        var s = sec % 60;
        statusEl.innerHTML = lastUpdateStr + ' (' + m + ':' + (s < 10 ? '0' : '') + s + ')';
      }
      update();
      countdownInterval = setInterval(update, 1000);
    }

    function loadPrices(callback) {
      statusEl.innerHTML = 'Buscando preços...';
      var xhr = new XMLHttpRequest();
      xhr.open('GET', 'crypto_prices.txt?_=' + Date.now(), true);
      xhr.timeout = 10000;

      xhr.onreadystatechange = function() {
        if (xhr.readyState === 4) {
          if (xhr.status === 200) {
            var lines = xhr.responseText.split('\n');
            var btcVal = null, ethVal = null;

            for (var i = 0; i < lines.length; i++) {
              var line = lines[i].trim();
              if (line === '' || line[0] === '#') continue;
              if (line.indexOf('BTC') !== -1) {
                var p = line.split(':');
                if (p[1]) btcVal = p[1].trim().split(' ')[0];
              }
              if (line.indexOf('ETH') !== -1) {
                var p = line.split(':');
                if (p[1]) ethVal = p[1].trim().split(' ')[0];
              }
            }

            if (btcVal && ethVal) {
              btcEl.innerHTML = formatNumber(btcVal);
              ethEl.innerHTML = formatNumber(ethVal);

              var d = new Date(getRealMs());
              var h = d.getHours();
              var m = d.getMinutes();
              lastUpdateStr = 'Atualizado às ' + h + ':' + (m < 10 ? '0' : '') + m;

              var nextMinutes = Math.ceil((m + 1) / 5) * 5;
              var addedHours = (nextMinutes >= 60) ? 1 : 0;
              if (addedHours) nextMinutes -= 60;

              var nextDate = new Date(d);
              nextDate.setHours(nextDate.getHours() + addedHours);
              nextDate.setMinutes(nextMinutes, 0, 0);

              startCountdownDisplay(nextDate.getTime());
              if (callback) callback(true);
            } else {
              statusEl.innerHTML = 'Erro: preços não encontrados';
              if (callback) callback(false);
            }
          } else {
            statusEl.innerHTML = 'Erro ao carregar (status ' + xhr.status + ')';
            if (callback) callback(false);
          }
        }
      };

      xhr.ontimeout = xhr.onerror = function() {
        statusEl.innerHTML = 'Erro de conexão';
        if (callback) callback(false);
      };

      xhr.send();
    }

    function scheduleNextUpdate() {
      var now = new Date(getRealMs());
      var minutes = now.getMinutes();
      var remainder = minutes % 5;
      var minutesToNext = (remainder === 0) ? 5 : 5 - remainder;

      var delayMs = (minutesToNext * 60000) - (now.getSeconds() * 1000) - now.getMilliseconds();
      if (delayMs < 500) delayMs = 500;

      setTimeout(function() {
        loadPrices(function() {
          scheduleNextUpdate();
        });
      }, delayMs);
    }

    // === INÍCIO ===
    window.addEventListener('load', function() {
      forceVideoPlay();
      syncServerTime(function() {
        loadPrices(function() {
          scheduleNextUpdate();
        });
      });
    });

    document.addEventListener('touchstart', forceVideoPlay, {once: true});

    // Reinicia vídeo a cada 45 minutos (mais suave para hardware antigo)
    setInterval(restartVideo, 45 * 60 * 1000);

    // Reload completo a cada 4 horas
    setTimeout(function() {
      location.reload(true);
    }, 4 * 60 * 60 * 1000);
  </script>
</body>
</html>
