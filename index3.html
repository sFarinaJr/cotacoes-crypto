<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1024, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <title>Cotação BTC e ETH</title>

  <style type="text/css">

    * {
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 1024px;
      height: 768px;
      overflow: hidden;
      margin: 0 auto;
      color: white;
      font-family: Arial, Helvetica, sans-serif;
      text-align: center;
      background: #000000;
    }

    /* === FUNDO FIXO EM IMAGEM (leve para iPad antigo) === */

    #bg-image {
      position: fixed;
      top: 0;
      left: 0;
      width: 1024px;
      height: 768px;
      background: url('black-poster.jpg') no-repeat center center;
      background-size: cover;
      z-index: -2;
    }

    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 1024px;
      height: 768px;
      background: rgba(10, 31, 58, 0.25);
      z-index: -1;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 1024px;
      height: 768px;

      display: -webkit-flex;
      display: flex;

      -webkit-flex-direction: column;
      flex-direction: column;

      -webkit-justify-content: center;
      justify-content: center;

      -webkit-align-items: center;
      align-items: center;
    }

    h1 {
      font-size: 60px;
      margin-bottom: 40px;
      color: #ffffff;
    }

    .item {
      margin: 40px 0;
      font-size: 120px;
      font-weight: bold;

      background: rgba(0, 0, 0, 0.30);

      padding: 20px 40px;

      border-radius: 16px;

      min-width: 720px;

      display: -webkit-flex;
      display: flex;

      -webkit-align-items: center;
      align-items: center;

      -webkit-justify-content: center;
      justify-content: center;

      white-space: nowrap;
      overflow: hidden;
    }

    .btc {
      color: #f58e11;
    }

    .eth {
      color: #edc40c;
    }

    .price {
      font-size: 108px;
      font-weight: bold;
    }

    img {
      width: 120px;
      height: auto;
      vertical-align: middle;
      margin-right: 20px;
    }

    #status {
      font-size: 28px;

      color: #000000;

      margin-top: 60px;

      background: rgba(255,255,255,0.75);

      padding: 8px 20px;

      border-radius: 12px;

      line-height: 1.4;
    }

  </style>
</head>

<body>

  <!-- FUNDO -->
  <div id="bg-image"></div>

  <!-- OVERLAY -->
  <div class="overlay"></div>

  <!-- CONTEÚDO -->
  <div class="container">

    <h1>Cotações Crypto</h1>

    <div class="item btc">

      <img
        src="bitcoin-btc-logo.svg"
        onerror="this.outerHTML='<span style=\'color:#f7931a; font-size:120px; vertical-align:middle; margin-right:20px;\'>₿</span>'"
        alt="BTC">

      BTC&nbsp;&nbsp;
      <span class="price" id="btc">—</span>

    </div>

    <div class="item eth">

      <img
        src="ethereum-eth-logo.svg"
        onerror="this.outerHTML='<span style=\'color:#627eea; font-size:120px; vertical-align:middle; margin-right:20px;\'>Ξ</span>'"
        alt="ETH">

      ETH&nbsp;&nbsp;
      <span class="price" id="eth">—</span>

    </div>

    <div id="status">
      Carregando preços iniciais...
    </div>

  </div>

  <script type="text/javascript">

    var btcEl = document.getElementById('btc');
    var ethEl = document.getElementById('eth');
    var statusEl = document.getElementById('status');

    var countdownInterval = null;
    var lastUpdateStr = '';
    var timeOffset = 0;

    function getRealMs() {
      return new Date().getTime() + timeOffset;
    }

    function syncServerTime(callback) {

      var xhr = new XMLHttpRequest();

      var url = 'crypto_prices.txt?_=' + new Date().getTime();

      xhr.open('HEAD', url, true);

      xhr.onreadystatechange = function() {

        if (xhr.readyState === 4) {

          var dateStr = xhr.getResponseHeader('Date');

          if (dateStr) {

            var serverMs = new Date(dateStr).getTime();

            timeOffset = serverMs - new Date().getTime();
          }

          if (callback) {
            callback();
          }
        }
      };

      xhr.send();
    }

    function formatNumber(num) {

      num = parseFloat(num);

      if (isNaN(num)) {
        return '—';
      }

      var str = num.toFixed(2);

      var parts = str.split('.');

      parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, '.');

      return parts.join(',');
    }

    function startCountdownDisplay(targetTimeMs) {

      if (countdownInterval) {
        clearInterval(countdownInterval);
      }

      function update() {

        var remainingMs = targetTimeMs - getRealMs();

        if (remainingMs <= 0) {

          statusEl.innerHTML = lastUpdateStr + ' (atualizando...)';

          clearInterval(countdownInterval);

          countdownInterval = null;

          return;
        }

        var remainingSec = Math.floor(remainingMs / 1000);

        var minsLeft = Math.floor(remainingSec / 60);

        var secsLeft = remainingSec % 60;

        var countdownText =
          '(' +
          minsLeft +
          ':' +
          (secsLeft < 10 ? '0' : '') +
          secsLeft +
          ')';

        statusEl.innerHTML =
          lastUpdateStr + ' ' + countdownText;
      }

      update();

      countdownInterval = setInterval(update, 1000);
    }

    function loadPrices(callback) {

      statusEl.innerHTML = 'Buscando preços...';

      var xhr = new XMLHttpRequest();

      var url = 'crypto_prices.txt?_=' + new Date().getTime();

      xhr.open('GET', url, true);

      xhr.timeout = 10000;

      xhr.onreadystatechange = function() {

        if (xhr.readyState === 4) {

          if (xhr.status === 200) {

            var text = xhr.responseText;

            var lines = text.split('\n');

            var btcVal = null;
            var ethVal = null;

            for (var i = 0; i < lines.length; i++) {

              var line = lines[i].replace(/^\s+|\s+$/g, '');

              if (line === '' || line.charAt(0) === '#') {
                continue;
              }

              if (line.indexOf('BTC') !== -1) {

                var partsBTC = line.split(':');

                if (partsBTC.length > 1) {
                  btcVal = partsBTC[1].replace(/^\s+|\s+$/g, '').split(' ')[0];
                }
              }

              if (line.indexOf('ETH') !== -1) {

                var partsETH = line.split(':');

                if (partsETH.length > 1) {
                  ethVal = partsETH[1].replace(/^\s+|\s+$/g, '').split(' ')[0];
                }
              }
            }

            if (btcVal !== null && ethVal !== null) {

              btcEl.innerHTML = formatNumber(btcVal);
              ethEl.innerHTML = formatNumber(ethVal);

              var d = new Date(getRealMs());

              var h = d.getHours();

              var m = d.getMinutes();

              lastUpdateStr =
                'Atualizado às ' +
                h +
                ':' +
                (m < 10 ? '0' : '') +
                m;

              var nextMinutes =
                Math.ceil((m + 1) / 5) * 5;

              var addedHours = 0;

              if (nextMinutes >= 60) {

                addedHours = 1;

                nextMinutes -= 60;
              }

              var nextDate = new Date(d);

              nextDate.setHours(nextDate.getHours() + addedHours);

              nextDate.setMinutes(nextMinutes);

              nextDate.setSeconds(0);

              nextDate.setMilliseconds(0);

              startCountdownDisplay(nextDate.getTime());

              if (callback) {
                callback(true);
              }

            } else {

              statusEl.innerHTML =
                'Erro: preços não encontrados';

              if (callback) {
                callback(false);
              }
            }

          } else {

            statusEl.innerHTML =
              'Erro ao carregar (status ' + xhr.status + ')';

            if (callback) {
              callback(false);
            }
          }
        }
      };

      xhr.ontimeout = function() {

        statusEl.innerHTML =
          'Timeout ao buscar preços';

        if (callback) {
          callback(false);
        }
      };

      xhr.onerror = function() {

        statusEl.innerHTML =
          'Erro de conexão';

        if (callback) {
          callback(false);
        }
      };

      xhr.send(null);
    }

    function scheduleNextUpdate() {

      var now = new Date(getRealMs());

      var minutes = now.getMinutes();

      var seconds = now.getSeconds();

      var msleft = now.getMilliseconds();

      var remainder = minutes % 5;

      var minutesToNext = 5 - remainder;

      if (remainder === 0) {
        minutesToNext = 5;
      }

      var delayMs =
        (minutesToNext * 60000) -
        (seconds * 1000) -
        msleft;

      if (delayMs < 500) {
        delayMs = 500;
      }

      setTimeout(function() {

        loadPrices(function(success) {

          scheduleNextUpdate();

        });

      }, delayMs);
    }

    /* INÍCIO */

    syncServerTime(function() {

      loadPrices(function() {

        scheduleNextUpdate();

      });

    });

    /* PREVENÇÃO DE CRASH NO IPAD */

    setTimeout(function() {

      location.reload(true);

    }, 6 * 60 * 60 * 1000);

  </script>

</body>
</html><!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1024, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Cotação Crypto Otimizada</title>

  <style type="text/css">
    * { margin: 0; padding: 0; }
    
    html, body {
      height: 100%;
      width: 1024px;
      margin: 0 auto;
      background-color: #000;
      color: white;
      font-family: Helvetica, Arial, sans-serif;
      overflow: hidden;
    }

    /* Imagem de fundo com filtro fixo - Processado uma vez só pela GPU */
    .bg-image {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: url('black-poster.jpg') no-repeat center center;
      background-size: cover;
      /* O desfoque aqui é muito mais leve que o backdrop-filter */
      -webkit-filter: blur(8px);
      filter: blur(8px);
      /* Aumentamos o scale para evitar bordas brancas no blur */
      -webkit-transform: scale(1.1);
      transform: scale(1.1);
      z-index: -1;
    }

    /* Camada escura para garantir contraste (Overlay) */
    .overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.4);
      z-index: 0;
    }

    .container {
      height: 100%;
      position: relative;
      z-index: 1;
      display: -webkit-box;
      display: -webkit-flex;
      display: flex;
      -webkit-box-orient: vertical;
      -webkit-flex-direction: column;
      flex-direction: column;
      -webkit-box-pack: center;
      -webkit-justify-content: center;
      justify-content: center;
      -webkit-box-align: center;
      -webkit-align-items: center;
      align-items: center;
      text-align: center;
    }

    h1 {
      font-size: 60px;
      margin-bottom: 40px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
    }

    .item {
      margin: 30px 0;
      background: rgba(20, 20, 20, 0.7); /* Fundo sólido semi-transparente */
      padding: 30px 50px;
      border-radius: 20px;
      min-width: 700px;
      display: -webkit-box;
      display: -webkit-flex;
      display: flex;
      -webkit-box-align: center;
      -webkit-align-items: center;
      align-items: center;
      -webkit-box-pack: center;
      -webkit-justify-content: center;
      justify-content: center;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .btc { color: #f58e11; }
    .eth { color: #edc40c; }

    .price {
      font-size: 110px;
      font-weight: bold;
      margin-left: 30px;
    }

    /* Fallback para ícones caso o SVG falhe */
    .icon-fallback {
      font-size: 100px;
      margin-right: 20px;
    }

    #status {
      font-size: 26px;
      color: #333;
      margin-top: 50px;
      background: rgba(255, 255, 255, 0.8);
      padding: 10px 25px;
      border-radius: 10px;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <div class="bg-image"></div>
  <div class="overlay"></div>

  <div class="container">
    <h1>Cotações Crypto</h1>
    
    <div class="item btc">
      <span class="icon-fallback">₿</span>
      BTC <span class="price" id="btc">—</span>
    </div>

    <div class="item eth">
      <span class="icon-fallback">Ξ</span>
      ETH <span class="price" id="eth">—</span>
    </div>

    <div id="status">Carregando...</div>
  </div>

  <script type="text/javascript">
    // Script simplificado para garantir compatibilidade com Safari antigo
    var btcEl = document.getElementById('btc');
    var ethEl = document.getElementById('eth');
    var statusEl = document.getElementById('status');
    var timeOffset = 0;

    function formatNumber(num) {
      num = parseFloat(num);
      if (isNaN(num)) return '—';
      var parts = num.toFixed(2).split('.');
      parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, '.');
      return parts.join(',');
    }

    function loadPrices() {
      var xhr = new XMLHttpRequest();
      // Cache bust com timestamp para evitar cache do iOS antigo
      xhr.open('GET', 'crypto_prices.txt?t=' + new Date().getTime(), true);
      xhr.onreadystatechange = function() {
        if (xhr.readyState === 4 && xhr.status === 200) {
          var lines = xhr.responseText.split('\n');
          var btcVal, ethVal;
          for (var i = 0; i < lines.length; i++) {
            if (lines[i].indexOf('BTC') !== -1) btcVal = lines[i].split(':')[1].trim().split(' ')[0];
            if (lines[i].indexOf('ETH') !== -1) ethVal = lines[i].split(':')[1].trim().split(' ')[0];
          }
          if (btcVal && ethVal) {
            btcEl.innerHTML = formatNumber(btcVal);
            ethEl.innerHTML = formatNumber(ethVal);
            var d = new Date();
            statusEl.innerHTML = 'Atualizado às ' + d.getHours() + ':' + (d.getMinutes() < 10 ? '0' : '') + d.getMinutes();
          }
        }
      };
      xhr.send();
    }

    // Atualiza a cada 30 segundos (mais seguro para bateria que o timer de 5 min complexo)
    loadPrices();
    setInterval(loadPrices, 30000);

    // Hard reload a cada 12 horas para limpar memória do sistema
    setTimeout(function() { window.location.reload(true); }, 12 * 60 * 60 * 1000);
  </script>
</body>
</html>
