<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1024, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Cotação BTC e ETH</title>

  <style type="text/css">
    * { margin: 0; padding: 0; }
    html, body {
      height: 100%; width: 1024px; margin: 0 auto;
      color: white; font-family: Arial, Helvetica, sans-serif;
      overflow: hidden; text-align: center; background-color: #000;
    }
    #bg-video {
      position: fixed; top: 50%; left: 50%;
      min-width: 100%; min-height: 100%;
      width: auto; height: auto;
      transform: translate(-50%, -50%); z-index: -2;
    }
    .overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(10, 31, 58, 0.25); z-index: -1;
    }
    .container {
      height: 100%; position: relative; z-index: 1;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
    }
    h1 { font-size: 60px; margin-bottom: 40px; color: #ffffff; }
    .item {
      margin: 40px 0; font-size: 120px; font-weight: bold;
      background: rgba(0, 0, 0, 0.30); padding: 20px 40px;
      border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      min-width: 720px; display: flex; align-items: center;
      justify-content: center; white-space: nowrap; overflow: hidden;
      backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
    }
    .btc { color: #f58e11; }
    .eth { color: #edc40c; }
    .price { font-size: 108px; font-weight: bold; }
    img { width: 120px; height: auto; vertical-align: middle; margin-right: 20px; }
    #status {
      font-size: 28px; color: #000; -webkit-text-stroke: 0.8px #555;
      text-shadow: -1px -1px 0 #ccc, 1px -1px 0 #ccc, -1px 1px 0 #ccc, 1px 1px 0 #ccc;
      margin-top: 60px; background: rgba(255, 255, 255, 0.75);
      padding: 8px 20px; border-radius: 12px;
      backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
      line-height: 1.4;
    }
  </style>
</head>
<body>

  <video id="bg-video" autoplay loop muted playsinline>
    <source src="fundo btc.mp4" type="video/mp4">
  </video>

  <div class="overlay"></div>

  <div class="container">
    <h1>Cotações Crypto</h1>
    <div class="item btc">
      <img src="bitcoin-btc-logo.svg" onerror="this.outerHTML='<span style=\'color:#f7931a; font-size:120px; margin-right:20px;\'>₿</span>'" alt="BTC">
      BTC&nbsp;&nbsp;<span class="price" id="btc">—</span>
    </div>
    <div class="item eth">
      <img src="ethereum-eth-logo.svg" onerror="this.outerHTML='<span style=\'color:#627eea; font-size:120px; margin-right:20px;\'>Ξ</span>'" alt="ETH">
      ETH&nbsp;&nbsp;<span class="price" id="eth">—</span>
    </div>
    <div id="status">Carregando...</div>
  </div>

  <script type="text/javascript">
    // Seleção de elementos única para poupar memória
    var btcEl = document.getElementById('btc');
    var ethEl = document.getElementById('eth');
    var statusEl = document.getElementById('status');
    var videoEl = document.getElementById('bg-video');
    
    var countdownInterval = null;
    var lastUpdateStr = '';
    var timeOffset = 0;
    
    // Objeto XHR único (Singleton) para evitar vazamento de memória
    var xhr = new XMLHttpRequest();

    function getRealMs() { return Date.now() + timeOffset; }

    function syncServerTime() {
      xhr.open('HEAD', 'crypto_prices.txt?_=' + Date.now(), true);
      xhr.onreadystatechange = function() {
        if (xhr.readyState === 4 && xhr.getResponseHeader('Date')) {
          timeOffset = new Date(xhr.getResponseHeader('Date')).getTime() - Date.now();
          loadPrices();
        }
      };
      xhr.send();
    }

    function formatNumber(num) {
      num = parseFloat(num);
      if (isNaN(num)) return '—';
      var parts = num.toFixed(2).split('.');
      parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, '.');
      return parts.join(',');
    }

    function startCountdownDisplay(targetTimeMs) {
      if (countdownInterval) clearInterval(countdownInterval);
      
      countdownInterval = setInterval(function() {
        var remainingMs = targetTimeMs - getRealMs();
        if (remainingMs <= 0) {
          statusEl.innerText = lastUpdateStr + ' (atualizando...)';
          clearInterval(countdownInterval);
          loadPrices(); // Chama a próxima atualização diretamente
          return;
        }
        var sec = Math.floor(remainingMs / 1000);
        var m = Math.floor(sec / 60);
        var s = sec % 60;
        statusEl.innerText = lastUpdateStr + ' (' + m + ':' + (s < 10 ? '0' : '') + s + ')';
      }, 1000);
    }

    function loadPrices() {
      xhr.open('GET', 'crypto_prices.txt?_=' + Date.now(), true);
      xhr.onreadystatechange = function() {
        if (xhr.readyState === 4 && xhr.status === 200) {
          var lines = xhr.responseText.split('\n');
          var btcVal, ethVal;

          for (var i = 0; i < lines.length; i++) {
            var line = lines[i].trim();
            if (line.indexOf('BTC') === 0) btcVal = line.split(':')[1].trim().split(' ')[0];
            if (line.indexOf('ETH') === 0) ethVal = line.split(':')[1].trim().split(' ')[0];
          }

          if (btcVal && ethVal) {
            btcEl.innerText = formatNumber(btcVal);
            ethEl.innerText = formatNumber(ethVal);
            
            var d = new Date(getRealMs());
            var m = d.getMinutes();
            lastUpdateStr = 'Atualizado às ' + d.getHours() + ':' + (m < 10 ? '0' : '') + m;

            // Cálculo do próximo ciclo de 5 min
            var nextDate = new Date(d);
            nextDate.setMinutes(Math.ceil((m + 0.1) / 5) * 5, 0, 0);
            startCountdownDisplay(nextDate.getTime());
          }
        }
      };
      xhr.send();
    }

    // Manutenção do Vídeo: Reinicia o player a cada 30 min para limpar cache de renderização
    setInterval(function() {
      videoEl.pause();
      videoEl.load();
      videoEl.play();
    }, 1800000);

    // Início
    syncServerTime();

    // Reload Preventivo: Reduzi para 3 horas, ideal para a RAM de 512MB do iPad 2
    setTimeout(function() {
      window.location.reload(true);
    }, 3 * 60 * 60 * 1000);
  </script>
</body>
</html>
