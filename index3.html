<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1024, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Cotação Crypto Otimizada</title>

  <style type="text/css">
    * { margin: 0; padding: 0; }
    
    html, body {
      height: 100%;
      width: 1024px;
      margin: 0 auto;
      background-color: #000;
      color: white;
      font-family: Helvetica, Arial, sans-serif;
      overflow: hidden;
    }

    /* Imagem de fundo com filtro fixo - Processado uma vez só pela GPU */
    .bg-image {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: url('black-poster.jpg') no-repeat center center;
      background-size: cover;
      /* O desfoque aqui é muito mais leve que o backdrop-filter */
      -webkit-filter: blur(8px);
      filter: blur(8px);
      /* Aumentamos o scale para evitar bordas brancas no blur */
      -webkit-transform: scale(1.1);
      transform: scale(1.1);
      z-index: -1;
    }

    /* Camada escura para garantir contraste (Overlay) */
    .overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.4);
      z-index: 0;
    }

    .container {
      height: 100%;
      position: relative;
      z-index: 1;
      display: -webkit-box;
      display: -webkit-flex;
      display: flex;
      -webkit-box-orient: vertical;
      -webkit-flex-direction: column;
      flex-direction: column;
      -webkit-box-pack: center;
      -webkit-justify-content: center;
      justify-content: center;
      -webkit-box-align: center;
      -webkit-align-items: center;
      align-items: center;
      text-align: center;
    }

    h1 {
      font-size: 60px;
      margin-bottom: 40px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
    }

    .item {
      margin: 30px 0;
      background: rgba(20, 20, 20, 0.7); /* Fundo sólido semi-transparente */
      padding: 30px 50px;
      border-radius: 20px;
      min-width: 700px;
      display: -webkit-box;
      display: -webkit-flex;
      display: flex;
      -webkit-box-align: center;
      -webkit-align-items: center;
      align-items: center;
      -webkit-box-pack: center;
      -webkit-justify-content: center;
      justify-content: center;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .btc { color: #f58e11; }
    .eth { color: #edc40c; }

    .price {
      font-size: 110px;
      font-weight: bold;
      margin-left: 30px;
    }

    /* Fallback para ícones caso o SVG falhe */
    .icon-fallback {
      font-size: 100px;
      margin-right: 20px;
    }

    #status {
      font-size: 26px;
      color: #333;
      margin-top: 50px;
      background: rgba(255, 255, 255, 0.8);
      padding: 10px 25px;
      border-radius: 10px;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <div class="bg-image"></div>
  <div class="overlay"></div>

  <div class="container">
    <h1>Cotações Crypto</h1>
    
    <div class="item btc">
      <span class="icon-fallback">₿</span>
      BTC <span class="price" id="btc">—</span>
    </div>

    <div class="item eth">
      <span class="icon-fallback">Ξ</span>
      ETH <span class="price" id="eth">—</span>
    </div>

    <div id="status">Carregando...</div>
  </div>

  <script type="text/javascript">
    // Script simplificado para garantir compatibilidade com Safari antigo
    var btcEl = document.getElementById('btc');
    var ethEl = document.getElementById('eth');
    var statusEl = document.getElementById('status');
    var timeOffset = 0;

    function formatNumber(num) {
      num = parseFloat(num);
      if (isNaN(num)) return '—';
      var parts = num.toFixed(2).split('.');
      parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, '.');
      return parts.join(',');
    }

    function loadPrices() {
      var xhr = new XMLHttpRequest();
      // Cache bust com timestamp para evitar cache do iOS antigo
      xhr.open('GET', 'crypto_prices.txt?t=' + new Date().getTime(), true);
      xhr.onreadystatechange = function() {
        if (xhr.readyState === 4 && xhr.status === 200) {
          var lines = xhr.responseText.split('\n');
          var btcVal, ethVal;
          for (var i = 0; i < lines.length; i++) {
            if (lines[i].indexOf('BTC') !== -1) btcVal = lines[i].split(':')[1].trim().split(' ')[0];
            if (lines[i].indexOf('ETH') !== -1) ethVal = lines[i].split(':')[1].trim().split(' ')[0];
          }
          if (btcVal && ethVal) {
            btcEl.innerHTML = formatNumber(btcVal);
            ethEl.innerHTML = formatNumber(ethVal);
            var d = new Date();
            statusEl.innerHTML = 'Atualizado às ' + d.getHours() + ':' + (d.getMinutes() < 10 ? '0' : '') + d.getMinutes();
          }
        }
      };
      xhr.send();
    }

    // Atualiza a cada 30 segundos (mais seguro para bateria que o timer de 5 min complexo)
    loadPrices();
    setInterval(loadPrices, 30000);

    // Hard reload a cada 12 horas para limpar memória do sistema
    setTimeout(function() { window.location.reload(true); }, 12 * 60 * 60 * 1000);
  </script>
</body>
</html>
