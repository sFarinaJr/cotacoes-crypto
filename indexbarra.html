<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { background: #000; color: #0f0; font-family: sans-serif; margin: 0; }
        .ticker-wrap { width: 100%; overflow: hidden; background: #222; padding: 10px 0; }
        #ticker { font-size: 20px; white-space: nowrap; }
    </style>
</head>
<body>

<div class="ticker-wrap">
    <!-- A tag marquee é perfeita para o hardware limitado do iPad 2 -->
    <marquee id="ticker" scrollamount="5">Carregando cotações...</marquee>
</div>

<script>
    function updatePrices() {
        // Usamos XMLHttpRequest em vez de 'fetch' para garantir compatibilidade com o Safari do iOS 9
        var xhr = new XMLHttpRequest();
        xhr.open("GET", "https://api.coingecko.com", true);
        xhr.onreadystatechange = function () {
            if (xhr.readyState == 4 && xhr.status == 200) {
                var data = JSON.parse(xhr.responseText);
                var text = " BTC: $" + data.bitcoin.usd + " | ETH: $" + data.ethereum.usd + " | ADA: $" + data.cardano.usd;
                document.getElementById('ticker').innerHTML = text;
            }
        };
        xhr.send();
    }

    // Atualiza a cada 60 segundos
    updatePrices();
    setInterval(updatePrices, 60000);
</script>

</body>
</html>
